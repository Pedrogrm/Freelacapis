<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Freelacapy - Login e Cadastro</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #672eba;
      --secondary-color: #00f7c2;
      --dark-color: #2a2a2a;
      --light-color: #f8f9fa;
      --gray-color: #6c757d;
    }
    
    body {
      background-color: #f5f7ff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      overflow: hidden;
    }

    .main-container {
      max-width: 1000px;
      width: 100%;
      min-height: 500px;
      background-color: white;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 15px 30px rgba(103, 46, 186, 0.1);
    }

    /* Containers dos formulários */
    .form-container {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 1.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Container de login - agora na direita */
    .login-container {
      left: 50%;
      z-index: 0;
    }

    /* Container de cadastro - agora na esquerda e visível por padrão */
    .register-container {
      left: 0;
      z-index: 100;
    }

    /* Painel deslizante (cortina) - agora na direita por padrão */
    .switch-panel {
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: 0;
      left: 50%;
      height: 100%;
      width: 50%;
      padding: 50px;
      z-index: 200;
      transition: all 1.25s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(135deg, var(--primary-color) 0%, #8a3ffb 100%);
      overflow: hidden;
      box-shadow: 4px 4px 15px rgba(139, 92, 246, 0.3);
    }

    /* Círculos decorativos */
    .switch-circle {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      bottom: -60%;
      left: -60%;
      transition: all 1.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .switch-circle--top {
      top: -30%;
      left: 60%;
      width: 300px;
      height: 300px;
    }

    /* Container do conteúdo do switch */
    .switch-content {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: absolute;
      width: 100%;
      padding: 50px;
      transition: 1.25s;
      text-align: center;
    }

    .switch-title {
      font-size: 28px;
      font-weight: 700;
      color: white;
      margin-bottom: 20px;
    }

    .switch-description {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .switch-button {
      width: 180px;
      height: 50px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1.15px;
      background-color: var(--secondary-color);
      color: white;
      border: none;
      outline: none;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 15px rgba(0, 247, 194, 0.3);
    }

    .switch-button:hover {
      background-color: #00e5b8;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 247, 194, 0.4);
    }

    /* Formulários */
    .form-title {
      font-size: 31px;
      font-weight: 700;
      color: var(--dark-color);
      margin-bottom: 30px;
      text-align: center;
    }

    .form-subtitle {
      font-size: 14px;
      color: var(--gray-color);
      margin-bottom: 30px;
      text-align: center;
    }

    .form-group {
      position: relative;
      margin-bottom: 20px;
    }

    .form-control {
      padding: 12px 20px 12px 45px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      font-size: 15px;
      transition: all 0.3s;
      width: 100%;
    }

    .form-control:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 0.2rem rgba(103, 46, 186, 0.1);
    }

    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-color);
      font-size: 18px;
    }

    .btn-submit {
      background-color: var(--primary-color);
      color: white;
      width: 100%;
      padding: 12px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      transition: all 0.3s ease;
      margin-top: 10px;
      font-size: 16px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(103, 46, 186, 0.3);
    }

    .btn-submit:hover {
      background-color: #5a25a8;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(103, 46, 186, 0.4);
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--gray-color);
    }

    /* Logo */
    .logo {
      width: 100px;
      margin-bottom: 25px;
    }

    /* Alertas */
    .alert {
      width: 100%;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: center;
    }

    .alert-error {
      background: #fee2e2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .alert-success {
      background: #d1fae5;
      color: #059669;
      border: 1px solid #a7f3d0;
    }

    /* Estados de visibilidade */
    .is-hidden {
      visibility: hidden;
      opacity: 0;
      transform: translateX(-30px);
    }

    /* Estados da transição - agora invertidos */
    .main-container.show-login .switch-panel {
      left: 0;
    }

    .main-container.show-login .login-container {
      left: 50%;
      z-index: 100;
    }

    .main-container.show-login .register-container {
      left: 0;
      z-index: 0;
    }

    .link-verde {
      text-decoration: none;
      color: var(--secondary-color);
    }
    
    .link-verde:hover {
      color: var(--primary-color);
      transition: 0.5s;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      body {
        padding: 10px;
        display: block;
      }

      .main-container {
        min-height: auto;
        max-width: 100%;
      }

      .form-container,
      .switch-panel {
        position: relative;
        width: 100%;
        height: auto;
        padding: 30px;
        left: 0 !important;
      }

      .login-container {
        display: none;
      }

      .main-container.show-login .login-container {
        display: flex;
      }

      .main-container.show-login .register-container {
        display: none;
      }

      .switch-panel {
        display: none;
      }

      .is-hidden {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="main-container" id="mainContainer">
    <!-- Container de Login - agora na direita e escondido por padrão -->
    <div class="form-container login-container" id="loginContainer">
      <form class="form" method="POST">
        <input type="hidden" name="action" value="login">
        
        <h2 class="form-title">Login</h2>
        
        <!-- Mensagens de erro/sucesso -->
        <div class="alert alert-error" style="display: none;"></div>
        <div class="alert alert-success" style="display: none;"></div>
        
        <div class="form-group">
          <i class="bx bxs-envelope input-icon"></i>
          <input type="email" name="email" class="form-control" placeholder="E-mail" required>
        </div>
        
        <div class="form-group">
          <i class="bx bxs-lock input-icon"></i>
          <input type="password" name="senha" class="form-control" placeholder="Senha" required>
        </div>
        
        <button type="submit" class="btn-submit">ENTRAR</button>
      </form>
    </div>

    <!-- Container de Cadastro - agora na esquerda e visível por padrão -->
    <div class="form-container register-container" id="registerContainer">
      <form class="form" method="POST">
        <input type="hidden" name="action" value="register">
        
        <h2 class="form-title">Cadastro</h2>
        
        <!-- Mensagens de erro/sucesso -->
        <div class="alert alert-error" style="display: none;"></div>
        
        <div class="form-group">
          <i class="bx bxs-user input-icon"></i>
          <input type="text" name="nome_completo" class="form-control" placeholder="Nome Completo" required>
        </div>
        
        <div class="form-group">
          <i class="bx bxs-envelope input-icon"></i>
          <input type="email" name="email" class="form-control" placeholder="E-mail" required>
        </div>
        
        <div class="form-group">
          <i class="bx bxs-lock input-icon"></i>
          <input type="password" name="senha" class="form-control" placeholder="Senha (mínimo 6 caracteres)" required>
        </div>
        
        <button type="submit" class="btn-submit">CADASTRAR</button>
        
        <div class="form-footer">
          É uma empresa? <a href="empresa.html" class="link-verde">Clique aqui</a>
        </div>
      </form>
    </div>

    <!-- Painel deslizante (Cortina) - agora na direita por padrão -->
    <div class="switch-panel" id="switch">
      <div class="switch-circle"></div>
      <div class="switch-circle switch-circle--top"></div>
      
      <!-- Conteúdo para tela de cadastro (visível por padrão) -->
      <div class="switch-content" id="switchToRegister">
        <img src="/img/Logo FreelaCapy branco.png" alt="Logo Freelacapy" class="logo">
        <h2 class="switch-title"><span style="color: var(--secondary-color);">Bem-vindo</span> ao Freelacapy!</h2>
        <p class="switch-description">
          Conecte-se com os melhores freelancers ou encontre projetos incríveis. Cadastre-se agora!
        </p>
        <button class="switch-button" onclick="toggleToLogin()">CADASTRAR-SE</button>
      </div>
      
      <!-- Conteúdo para tela de login (escondido por padrão) -->
      <div class="switch-content is-hidden" id="switchToLogin">
        <img src="/img/Logo FreelaCapy branco.png" alt="Logo Freelacapy" class="logo">
        <h2 class="switch-title"><span style="color: var(--secondary-color);">Bem-vindo</span> de volta!</h2>
        <p class="switch-description">
          Acesse sua conta e continue conectado com os melhores freelancers e projetos incríveis.
        </p>
        <button class="switch-button" onclick="toggleToRegister()">FAZER LOGIN</button>
      </div>
    </div>
  </div>

  <script>
    // Variáveis de controle
    let isTransitioning = false;
    let isLoginMode = false; // Começamos com false (cadastro visível)

    /**
     * Alternar para tela de cadastro
     */
    function toggleToRegister() {
      if (isTransitioning) return;
      
      isTransitioning = true;
      isLoginMode = false;
      
      const mainContainer = document.getElementById('mainContainer');
      const switchToRegister = document.getElementById('switchToRegister');
      const switchToLogin = document.getElementById('switchToLogin');
      
      // Remover classe para mostrar cadastro
      mainContainer.classList.remove('show-login');
      
      // Alternar conteúdo do switch imediatamente
      switchToLogin.classList.add('is-hidden');
      switchToRegister.classList.remove('is-hidden');
      
      // Liberar transição após completar
      setTimeout(() => {
        isTransitioning = false;
      }, 1250);
    }

    /**
     * Alternar para tela de login
     */
    function toggleToLogin() {
      if (isTransitioning) return;
      
      isTransitioning = true;
      isLoginMode = true;
      
      const mainContainer = document.getElementById('mainContainer');
      const switchToRegister = document.getElementById('switchToRegister');
      const switchToLogin = document.getElementById('switchToLogin');
      
      // Adicionar classe para mostrar login
      mainContainer.classList.add('show-login');
      
      // Alternar conteúdo do switch imediatamente
      switchToRegister.classList.add('is-hidden');
      switchToLogin.classList.remove('is-hidden');
      
      // Liberar transição após completar
      setTimeout(() => {
        isTransitioning = false;
      }, 1250);
    }

    /**
     * Animação de entrada da página
     */
    document.addEventListener('DOMContentLoaded', function() {
      const mainContainer = document.getElementById('mainContainer');
      mainContainer.style.opacity = '0';
      mainContainer.style.transform = 'scale(0.95)';
      
      setTimeout(() => {
        mainContainer.style.transition = 'all 0.5s ease';
        mainContainer.style.opacity = '1';
        mainContainer.style.transform = 'scale(1)';
      }, 100);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
